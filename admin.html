<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم — بن الحشم</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Tajawal', sans-serif; background: #0f0700; color: #F5E6C8; min-height: 100vh; direction: rtl; }

    /* ===== LOGIN ===== */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(90,45,5,0.4) 0%, transparent 70%), #0f0700;
    }
    .login-box {
      background: rgba(20,8,0,0.95); border: 1px solid rgba(201,150,42,0.3);
      border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 380px;
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .login-box h2 { color: #C9962A; font-size: 1.5rem; margin-bottom: 8px; }
    .login-box p  { color: rgba(245,230,200,0.5); font-size: 13px; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 13px; margin: 7px 0; border-radius: 9px;
      border: 1px solid rgba(201,150,42,0.25); background: rgba(30,12,0,0.7);
      color: #F5E6C8; font-family: 'Tajawal', sans-serif; font-size: 14px; outline: none;
    }
    .login-box input:focus { border-color: #C9962A; }
    .login-box button {
      width: 100%; padding: 14px; margin-top: 12px; background: #C9962A;
      color: #1C0A00; font-weight: 800; border: none; border-radius: 10px;
      font-size: 15px; font-family: 'Tajawal', sans-serif; cursor: pointer;
    }
    .login-box button:hover { background: #E8B84B; }
    .login-error { color: #E8855A; font-size: 13px; margin-top: 10px; min-height: 20px; }

    /* ===== DASHBOARD ===== */
    #dashboard { display: none; }

    .top-bar {
      background: rgba(15,6,0,0.9); border-bottom: 1px solid rgba(201,150,42,0.2);
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
    }
    .top-bar h1 { color: #C9962A; font-size: 1.1rem; font-weight: 800; }
    .logout-btn {
      background: transparent; border: 1px solid rgba(217,64,32,0.4); color: #E8855A;
      padding: 7px 18px; border-radius: 8px; cursor: pointer;
      font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700;
    }
    .logout-btn:hover { background: rgba(217,64,32,0.15); }

    /* ===== STATS ===== */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; padding: 20px 20px 0;
    }
    .stat-card {
      background: rgba(20,8,0,0.85); border: 1px solid rgba(201,150,42,0.2);
      border-radius: 12px; padding: 18px 16px; text-align: center;
    }
    .stat-card .num { font-size: 2rem; font-weight: 800; color: #C9962A; }
    .stat-card .lbl { font-size: 12px; color: rgba(245,230,200,0.5); margin-top: 4px; }

    /* ===== TABS ===== */
    .tabs {
      display: flex; gap: 8px; padding: 20px 20px 0;
      border-bottom: 1px solid rgba(201,150,42,0.15);
    }
    .tab-btn {
      padding: 10px 20px; border-radius: 8px 8px 0 0;
      border: 1px solid rgba(201,150,42,0.2); border-bottom: none;
      background: transparent; color: rgba(245,230,200,0.5);
      font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: rgba(201,150,42,0.12); color: #C9962A; border-color: #C9962A; }

    /* ===== ORDERS TABLE ===== */
    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }

    .filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-row select, .filter-row button {
      padding: 9px 14px; border-radius: 8px;
      border: 1px solid rgba(201,150,42,0.3);
      background: rgba(30,12,0,0.8); color: #F5E6C8;
      font-family: 'Tajawal', sans-serif; font-size: 13px; cursor: pointer;
    }
    .filter-row button { background: #C9962A; color: #1C0A00; font-weight: 800; border-color: #C9962A; }
    .filter-row button:hover { background: #E8B84B; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      background: rgba(201,150,42,0.1); color: #C9962A;
      padding: 10px 12px; text-align: right; font-weight: 800;
      border-bottom: 1px solid rgba(201,150,42,0.2);
    }
    td {
      padding: 10px 12px; border-bottom: 1px solid rgba(201,150,42,0.08);
      color: rgba(245,230,200,0.8); vertical-align: top;
    }
    tr:hover td { background: rgba(201,150,42,0.04); }

    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 800;
    }
    .s-new     { background: rgba(217,64,32,0.2);  color: #E8855A; border: 1px solid rgba(217,64,32,0.4); }
    .s-prep    { background: rgba(201,150,42,0.2); color: #C9962A; border: 1px solid rgba(201,150,42,0.4); }
    .s-shipped { background: rgba(40,85,160,0.2);  color: #7899D4; border: 1px solid rgba(40,85,160,0.4); }
    .s-done    { background: rgba(58,122,58,0.2);  color: #7BC67E; border: 1px solid rgba(58,122,58,0.4); }
    .s-cancel  { background: rgba(100,100,100,0.2); color: #888;   border: 1px solid rgba(100,100,100,0.4); }

    .action-select {
      padding: 5px 8px; border-radius: 6px; font-size: 12px;
      border: 1px solid rgba(201,150,42,0.3); background: rgba(30,12,0,0.8);
      color: #F5E6C8; font-family: 'Tajawal', sans-serif; cursor: pointer;
    }

    /* ===== PROMO FORM ===== */
    .form-box {
      background: rgba(20,8,0,0.85); border: 1px solid rgba(201,150,42,0.2);
      border-radius: 12px; padding: 20px; max-width: 500px; margin-bottom: 24px;
    }
    .form-box h3 { color: #C9962A; margin-bottom: 14px; font-size: 1rem; }
    .form-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .form-box input {
      flex: 1; padding: 10px 12px; border-radius: 8px;
      border: 1px solid rgba(201,150,42,0.25); background: rgba(30,12,0,0.7);
      color: #F5E6C8; font-family: 'Tajawal', sans-serif; font-size: 13px; outline: none; min-width: 120px;
    }
    .form-box input:focus { border-color: #C9962A; }
    .form-box label { font-size: 12px; color: rgba(245,230,200,0.5); display: block; margin-bottom: 4px; }
    .submit-btn {
      padding: 10px 20px; background: #C9962A; color: #1C0A00;
      border: none; border-radius: 8px; font-family: 'Tajawal', sans-serif;
      font-weight: 800; font-size: 13px; cursor: pointer; white-space: nowrap;
    }
    .submit-btn:hover { background: #E8B84B; }
    .form-msg { font-size: 13px; margin-top: 10px; min-height: 18px; }

    /* ===== LOADING ===== */
    .loading { text-align: center; padding: 40px; color: rgba(245,230,200,0.4); font-size: 14px; }

    @media (max-width: 700px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 12px 0; }
      .stat-card .num { font-size: 1.4rem; }
      .tab-content { padding: 12px; }
      table { font-size: 11px; }
      th, td { padding: 8px 6px; }
    }
  </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
  <div class="login-box">
    <h2>☕ بن الحشم</h2>
    <p>لوحة تحكم الأدمن</p>
    <input type="text"     id="adminUser" placeholder="اسم المستخدم">
    <input type="password" id="adminPass" placeholder="كلمة المرور">
    <button onclick="adminLogin()">دخول 🔐</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">

  <div class="top-bar">
    <h1>☕ لوحة تحكم — بن الحشم</h1>
    <button class="logout-btn" onclick="logout()">خروج ↩</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="num" id="statTotal">-</div>
      <div class="lbl">إجمالي الطلبات</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statNew">-</div>
      <div class="lbl">طلبات جديدة 🔴</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statRevenue">-</div>
      <div class="lbl">الإيراد الكلي (جنيه)</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('orders')">📦 الطلبات</button>
    <button class="tab-btn"        onclick="switchTab('promo')">🎟️ أكواد الخصم</button>
  </div>

  <!-- ORDERS TAB -->
  <div class="tab-content active" id="tab-orders">
    <div class="filter-row">
      <select id="statusFilter" onchange="loadOrders()">
        <option value="">كل الطلبات</option>
        <option value="جديد">جديد</option>
        <option value="قيد التجهيز">قيد التجهيز</option>
        <option value="تم الشحن">تم الشحن</option>
        <option value="تم التسليم">تم التسليم</option>
        <option value="ملغي">ملغي</option>
      </select>
      <button onclick="loadOrders()">🔄 تحديث</button>
    </div>

    <div id="ordersTableContainer" class="loading">⏳ جاري التحميل...</div>
  </div>

  <!-- PROMO TAB -->
  <div class="tab-content" id="tab-promo">
    <div class="form-box">
      <h3>➕ إضافة كود خصم جديد</h3>
      <div class="form-row">
        <div>
          <label>الكود</label>
          <input type="text" id="newPromoCode" placeholder="مثال: SUMMER20">
        </div>
        <div>
          <label>نسبة الخصم %</label>
          <input type="number" id="newPromoDiscount" placeholder="10" min="1" max="100">
        </div>
        <div>
          <label>أقصى استخدام</label>
          <input type="number" id="newPromoMax" placeholder="100" min="1">
        </div>
        <button class="submit-btn" onclick="addPromo()">إضافة</button>
      </div>
      <div class="form-msg" id="promoFormMsg"></div>
    </div>

    <div id="promoTableContainer" class="loading">⏳ جاري التحميل...</div>
  </div>

</div>

<script>
 const API = "https://heshem2-production.up.railway.app/api";
  let token = localStorage.getItem("adminToken");

  // ===== LOGIN =====
  async function adminLogin() {
    const username = document.getElementById("adminUser").value.trim();
    const password = document.getElementById("adminPass").value.trim();
    const errEl    = document.getElementById("loginError");

    try {
      const res  = await fetch(API + "/admin/login", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        token = data.token;
        localStorage.setItem("adminToken", token);
        showDashboard();
      } else {
        errEl.innerText = "❌ " + data.error;
      }
    } catch {
      errEl.innerText = "❌ السيرفر مش شغال";
    }
  }

  function logout() {
    localStorage.removeItem("adminToken");
    token = null;
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("dashboard").style.display   = "none";
  }

  function showDashboard() {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display   = "block";
    loadStats();
    loadOrders();
  }

  // Auto-login if token exists
  if (token) showDashboard();

  // ===== TABS =====
  function switchTab(name) {
    document.querySelectorAll(".tab-btn").forEach((b, i) => {
      b.classList.toggle("active", ["orders","promo"][i] === name);
    });
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");

    if (name === "promo") loadPromos();
  }

  // ===== STATS =====
  async function loadStats() {
    try {
      const res  = await fetch(API + "/admin/stats", { headers: { Authorization: "Bearer " + token } });
      const data = await res.json();
      document.getElementById("statTotal").innerText   = data.totalOrders || 0;
      document.getElementById("statNew").innerText     = data.newOrders   || 0;
      document.getElementById("statRevenue").innerText = (data.totalRevenue || 0).toLocaleString();
    } catch {}
  }

  // ===== ORDERS =====
  async function loadOrders() {
    const status    = document.getElementById("statusFilter").value;
    const container = document.getElementById("ordersTableContainer");
    container.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';

    try {
      const res  = await fetch(API + "/admin/orders?status=" + encodeURIComponent(status), {
        headers: { Authorization: "Bearer " + token }
      });
      const data = await res.json();

      if (!data.success || !data.data.length) {
        container.innerHTML = '<div class="loading">لا يوجد طلبات</div>';
        return;
      }

      const statusClass = { "جديد":"s-new","قيد التجهيز":"s-prep","تم الشحن":"s-shipped","تم التسليم":"s-done","ملغي":"s-cancel" };

      let html = `<table>
        <thead><tr>
          <th>#</th><th>الاسم</th><th>الهاتف</th><th>المنتجات</th>
          <th>الإجمالي</th><th>الحالة</th><th>تعديل</th><th>التاريخ</th>
        </tr></thead><tbody>`;

      data.data.forEach((o, i) => {
        const items     = o.items.map(it => it.name + " ×" + it.qty).join("، ");
        const dateStr   = new Date(o.createdAt).toLocaleDateString("ar-EG", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
        const sClass    = statusClass[o.status] || "s-new";
        const shortId   = o._id.toString().slice(-6).toUpperCase();
        html += `<tr>
          <td>#${shortId}</td>
          <td><strong>${o.customerName}</strong><br><span style="color:rgba(245,230,200,0.5);font-size:11px">${o.customerAddress}</span></td>
          <td><a href="tel:${o.customerPhone}" style="color:#C9962A;text-decoration:none">${o.customerPhone}</a></td>
          <td style="max-width:160px;line-height:1.6">${items}</td>
          <td style="color:#C9962A;font-weight:800">${o.totalAfter} ج</td>
          <td><span class="status-badge ${sClass}">${o.status}</span></td>
          <td>
            <select class="action-select" onchange="updateOrderStatus('${o._id}', this.value)">
              <option value="">-- تغيير --</option>
              <option value="جديد">جديد</option>
              <option value="قيد التجهيز">قيد التجهيز</option>
              <option value="تم الشحن">تم الشحن</option>
              <option value="تم التسليم">تم التسليم</option>
              <option value="ملغي">ملغي</option>
            </select>
          </td>
          <td style="font-size:11px;color:rgba(245,230,200,0.45)">${dateStr}</td>
        </tr>`;
      });

      html += "</tbody></table>";
      container.innerHTML = html;
    } catch (err) {
      container.innerHTML = '<div class="loading">❌ خطأ في التحميل</div>';
    }
  }

  async function updateOrderStatus(id, status) {
    if (!status) return;
    try {
      await fetch(API + "/admin/orders/" + id, {
        method:  "PATCH",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body:    JSON.stringify({ status })
      });
      loadOrders();
      loadStats();
    } catch {}
  }

  // ===== PROMO CODES =====
  async function loadPromos() {
    const container = document.getElementById("promoTableContainer");
    container.innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';

    try {
      const res  = await fetch(API + "/admin/promo", { headers: { Authorization: "Bearer " + token } });
      const data = await res.json();

      if (!data.success || !data.data.length) {
        container.innerHTML = '<div class="loading">لا يوجد أكواد</div>';
        return;
      }

      let html = `<table>
        <thead><tr><th>الكود</th><th>الخصم %</th><th>الاستخدام</th><th>الأقصى</th><th>الحالة</th></tr></thead><tbody>`;

      data.data.forEach(p => {
        html += `<tr>
          <td><strong style="color:#C9962A">${p.code}</strong></td>
          <td>${p.discount}%</td>
          <td>${p.usedCount}</td>
          <td>${p.maxUses}</td>
          <td>${p.active ? '<span style="color:#7BC67E">✅ فعال</span>' : '<span style="color:#E8855A">❌ معطل</span>'}</td>
        </tr>`;
      });

      html += "</tbody></table>";
      container.innerHTML = html;
    } catch {
      container.innerHTML = '<div class="loading">❌ خطأ في التحميل</div>';
    }
  }

  async function addPromo() {
    const code     = document.getElementById("newPromoCode").value.trim().toUpperCase();
    const discount = Number(document.getElementById("newPromoDiscount").value);
    const maxUses  = Number(document.getElementById("newPromoMax").value) || 100;
    const msgEl    = document.getElementById("promoFormMsg");

    if (!code || !discount) { msgEl.style.color = "#E8855A"; msgEl.innerText = "⚠️ ادخل الكود والخصم"; return; }

    try {
      const res  = await fetch(API + "/admin/promo", {
        method:  "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
        body:    JSON.stringify({ code, discount, maxUses })
      });
      const data = await res.json();

      if (data.success) {
        msgEl.style.color = "#7BC67E";
        msgEl.innerText   = "✅ تم إضافة الكود!";
        document.getElementById("newPromoCode").value     = "";
        document.getElementById("newPromoDiscount").value = "";
        document.getElementById("newPromoMax").value      = "";
        loadPromos();
      } else {
        msgEl.style.color = "#E8855A";
        msgEl.innerText   = "❌ " + data.error;
      }
    } catch {
      msgEl.style.color = "#E8855A";
      msgEl.innerText   = "❌ خطأ في الاتصال";
    }
  }

  // Enter key on login
  document.addEventListener("keydown", e => {
    if (e.key === "Enter" && document.getElementById("loginScreen").style.display !== "none") adminLogin();
  });
</script>
</body>
</html>
